<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Deletreo Extremo</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 10px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #saludoUsuario { font-size: 18px; color: #555; font-weight: bold; margin-bottom: 15px; }
        #palabraObjetivo { font-size: 32px; font-weight: bold; color: #111; margin: 20px 0; letter-spacing: 1px; }
        #resultado { font-size: 18px; font-weight: bold; margin-top: 20px; padding: 10px; border-radius: 5px; }
        .correcto { color: green; background-color: #e2f0d9; }
        .incorrecto { color: red; background-color: #fce4d6; }
        .error-alerta { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
        textarea { width: 90%; height: 60px; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .guia-voz { font-size: 13px; color: #666; margin-top: 5px; background: #e9ecef; padding: 8px; border-radius: 5px; text-align: left;}
        .marcador { display: flex; justify-content: space-around; margin: 20px 0; padding: 10px; background: #f8f9fa; border-radius: 5px; border: 1px solid #ddd; }
        .puntos { font-size: 20px; font-weight: bold; }
        .cambiar-nombre { font-size: 11px; color: #007bff; cursor: pointer; text-decoration: underline; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div id="saludoUsuario">¡Hola!</div>
    <span class="cambiar-nombre" onclick="pedirNombre(true)">Cambiar de usuario</span>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

    <h2>Mi Banco de Deletreo 🗣️</h2>
    <p>Escribe tus palabras separadas por comas:</p>
    <textarea id="listaPalabras">artístico, adjetivo, aventura, historieta, contagioso, oceánico, biblioteca, bocadillo, escultura, tropezó, murciélago, terremoto, proyecto, coloquial, brújula, libélula, fantasía, océano, vertical, obispo, relámpago, valentía, microbio, azulejos, magnífico, ganadero, Gabriel, científico, telescopio, hambriento, primitivo, horizonte, sembrado, diccionario, jilguero, barquero, Argentina, cordillera, indeciso, endosar</textarea>
    
    <br>
    <button onclick="seleccionarPalabra()">🎯 Elegir Palabra al Azar</button>
    
    <div id="palabraObjetivo">---</div>
    
    <button id="btnEscuchar" onclick="iniciarReconocimiento()" disabled>🎤 Decir Deletreo</button>
    
    <div class="guia-voz">
        <strong>💡 Tip de deletreo:</strong> Di las letras normales o detalla los acentos en voz alta: <em>"a con tilde"</em> o <em>"u con diéresis"</em>.
    </div>
    
    <div class="marcador">
        <div class="puntos" style="color: green;">Aciertos: <span id="contadorAciertos">0</span></div>
        <div class="puntos" style="color: red;">Errores: <span id="contadorErrores">0</span></div>
    </div>
    
    <div id="escuchado">Te escuché: <span id="textoEscuchado" style="font-style: italic; color: #555;">...</span></div>
    <div id="resultado">Presiona el botón azul para iniciar.</div>
</div>

<script>
    let palabraActual = "";
    let estaEscuchando = false; 
    let nombreUsuario = "";
    let aciertos = 0;
    let errores = 0;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    } else {
        alert("Tu navegador no soporta el reconocimiento de voz. Prueba con Google Chrome.");
    }

    function pedirNombre(forzarCambio = false) {
        if (forzarCambio) {
            let nuevoNombre = prompt("Introduce tu nombre de usuario:");
            if (nuevoNombre && nuevoNombre.trim() !== "") {
                nombreUsuario = nuevoNombre.trim();
                localStorage.setItem("deletreo_nombre", nombreUsuario);
            }
        } else {
            nombreUsuario = localStorage.getItem("deletreo_nombre");
            if (!nombreUsuario) {
                let primerNombre = prompt("¡Bienvenido! Por favor introduce tu nombre:");
                if (primerNombre && primerNombre.trim() !== "") {
                    nombreUsuario = primerNombre.trim();
                    localStorage.setItem("deletreo_nombre", nombreUsuario);
                } else {
                    nombreUsuario = "Jugador";
                }
            }
        }
        document.getElementById("saludoUsuario").innerText = "¡Hola, " + nombreUsuario + "! ✨ Vamos a practicar.";
    }

    pedirNombre();

    function reproducirRespuestaVoz(mensaje) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(mensaje);
            utterance.lang = 'es-ES'; 
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
        }
    }

    function procesarAcentosPorVoz(texto) {
        let convertido = texto.toLowerCase();
        convertido = convertido.replace(/a con tilde/g, "á")
                               .replace(/e con tilde/g, "é")
                               .replace(/i con tilde/g, "í")
                               .replace(/o con tilde/g, "ó")
                               .replace(/u con tilde/g, "ú")
                               .replace(/u con diéresis/g, "ü")
                               .replace(/u con dieresis/g, "ü");

        convertido = convertido.replace(/[\s\.\-,]/g, "").replace(/coma/g, "");
        return convertido;
    }

    function seleccionarPalabra() {
        if (!recognition) return;

        if (estaEscuchando) {
            recognition.abort();
            estaEscuchando = false;
        }

        const texto = document.getElementById("listaPalabras").value;
        const banco = texto.split(",").map(p => p.trim()).filter(p => p.length > 0);
        
        if(banco.length === 0) {
            alert("Por favor, ingresa al menos una palabra.");
            return;
        }
        
        const indice = Math.floor(Math.random() * banco.length);
        palabraActual = banco[indice]; 
        
        document.getElementById("palabraObjetivo").innerText = palabraActual;
        
        const divResultado = document.getElementById("resultado");
        divResultado.innerText = "¡Palabra lista! Presiona el micrófono para deletrear.";
        divResultado.className = ""; 
        
        document.getElementById("textoEscuchado").innerText = "...";
        document.getElementById("btnEscuchar").disabled = false;
        document.getElementById("btnEscuchar").innerText = "🎤 Decir Deletreo";
    }

    function iniciarReconocimiento() {
        if (!recognition || estaEscuchando) return; 

        try {
            document.getElementById("resultado").innerText = "🎙️ Escuchando... Deletrea pausadamente.";
            document.getElementById("resultado").className = "";
            document.getElementById("btnEscuchar").innerText = "⏳ Grabando...";
            estaEscuchando = true;
            recognition.start();
        } catch (e) {
            estaEscuchando = false;
            document.getElementById("btnEscuchar").innerText = "🎤 Decir Deletreo";
        }
    }

    if (recognition) {
        recognition.onresult = function(event) {
            estaEscuchando = false;
            document.getElementById("btnEscuchar").innerText = "🎤 Decir Deletreo";

            let vozUsuario = event.results[0][0].transcript;
            let deletreoLimpio = procesarAcentosPorVoz(vozUsuario);
            let objetivoLimpio = palabraActual.toLowerCase().replace(/[\s\.\-,]/g, "");
            
            document.getElementById("textoEscuchado").innerText = vozUsuario;
            const divResultado = document.getElementById("resultado");
            
            if (deletreoLimpio === objetivoLimpio) {
                aciertos++;
                document.getElementById("contadorAciertos").innerText = aciertos;
                divResultado.className = "correcto";
                divResultado.innerHTML = "✅ ¡Excelente! Deletreo correcto.";
                reproducirRespuestaVoz(`Muy bien, ¡Felicidades, ${nombreUsuario}!`);
            } else {
                errores++;
                document.getElementById("contadorErrores").innerText = errores;
                divResultado.className = "incorrecto";
                divResultado.innerHTML = "❌ Oh no, fallaste. Inténtalo de nuevo.";
                reproducirRespuestaVoz("No, no, te equivocaste, vuelve a intentarlo.");
            }
        };

        recognition.onend = function() {
            estaEscuchando = false;
            if (document.getElementById("btnEscuchar").innerText === "⏳ Grabando...") {
                document.getElementById("btnEscuchar").innerText = "🎤 Decir Deletreo";
            }
        };

        recognition.onerror = function() {
            estaEscuchando = false;
            document.getElementById("btnEscuchar").innerText = "🎤 Decir Deletreo";
        };
    }
</script>

</body>
</html>
